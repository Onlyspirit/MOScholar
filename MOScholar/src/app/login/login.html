<div class="parent">
  <!-- LEFT PANEL -->
  <div class="first">
    <div class="title fs-1 fw-light">MOScholar</div>
    <p class="subtitle">Welcome back! Log in to continue your learning journey.</p>
    <img src="assets/login-illustration.svg" alt="Login illustration" class="side-img">
  </div>

  <!-- RIGHT PANEL -->
  <div class="second">
    <div class="third">
      <div class="form">
        <form (ngSubmit)="onLogin()" #loginForm="ngForm">

          <div class="input-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              ngModel
              required
              placeholder="Enter Email"
            />
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              ngModel
              required
              placeholder="Enter Password"
            />
          </div>

          <input class="inputt" type="submit" value="Login">

          <p class="footer-text">
            Don’t have an account?
            <span class="link" (click)="signup()">Create one</span>
          </p>
        </form>
      </div>
    </div>
  </div>
</div>
